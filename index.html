<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Roast Mode Pro (v7)</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
text-align:center;
}

h1{margin:10px;}
#version{color:#888;font-size:14px;}
#status{margin:8px;padding:8px;background:#111;border-radius:8px;}

button{
font-size:20px;
padding:14px 18px;
min-width:170px;
border:none;
border-radius:12px;
cursor:pointer;
}

.green{background:#1f7a1f;color:white;}
.orange{background:#b36b00;color:white;}
.red{background:#7a1f1f;color:white;}
.blue{background:#1f4f7a;color:white;}

.row{display:flex;justify-content:center;flex-wrap:wrap;gap:10px;margin:10px;}

#timer{font-size:40px;}

canvas{max-width:95%;background:#111;border-radius:10px;}

#timeline{margin:15px;color:#bbb;font-size:14px;}
</style>
</head>

<body>

<h1>Roast Mode Pro</h1>
<div id="version">v7</div>

<div id="status">Ready</div>

<div class="row">
<button class="blue" onclick="initVoice()">Voice</button>
<button class="green" onclick="startRoast()">Start Roast</button>
<button class="orange" onclick="markFirstCrack()">First Crack</button>
<button class="red" onclick="endRoast()">End Roast</button>
</div>

<div id="timer">00:00</div>

<canvas id="chart"></canvas>

<div id="timeline"></div>

<script>

let startTime=0;
let fcTime=null;
let endTime=null;
let tempInterval=null;
let chart=null;
let roastTemp=0;

/* INIT */
window.onload=function(){
chart=new Chart(
document.getElementById("chart"),
{
type:"line",
data:{labels:[],datasets:[{data:[],borderColor:"#ffcc00"}]}
}
);
document.getElementById("status").innerText="Ready";
};

/* TIMER SPEECH FIX */
function speak(msg){
speechSynthesis.cancel();
speechSynthesis.speak(new SpeechSynthesisUtterance(msg));
}

/* START ROAST */
function startRoast(){

roastTemp=parseFloat(prompt("Enter starting temperature:"));

startTime=Date.now();
fcTime=null;
endTime=null;

startTimer();

clearInterval(tempInterval);
tempInterval=setInterval(()=>{
speak("Current temperature?");
},30000);

speak("Roast started at "+roastTemp+" degrees");

document.getElementById("status").innerText="Running";
}

/* TIMER */
function startTimer(){
setInterval(()=>{
if(!startTime)return;
let s=Math.floor((Date.now()-startTime)/1000);
document.getElementById("timer").innerText=
Math.floor(s/60)+":"+String(s%60).padStart(2,"0");
},1000);
}

/* FIRST CRACK */
function markFirstCrack(){
fcTime=Date.now();
document.getElementById("status").innerText="First Crack";
updateTimeline();
}

/* END */
function endRoast(){
endTime=Date.now();
updateTimeline();
speak("Roast complete");
}

/* TIMELINE RESTORED PROPERLY */
function updateTimeline(){

if(!fcTime||!endTime)return;

let dev=(endTime-fcTime)/1000;

let marks=[15,17.5,20,22.5,25];

document.getElementById("timeline").innerHTML=
"<b>Development Timeline</b><br>"+
marks.map(p=>{
let t=(p/100)*dev;
return p+"% → "+format(t);
}).join("<br>");
}

/* FORMAT */
function format(s){
s=Math.floor(s);
return Math.floor(s/60)+":"+String(s%60).padStart(2,"0");
}

</script>

</body>
</html>

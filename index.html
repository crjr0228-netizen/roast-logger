<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Roast Mode Pro (Voice v2)</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
text-align:center;
}

h1{margin:10px;}

#version{
font-size:14px;
color:#888;
}

#status{
margin:10px;
padding:8px;
background:#111;
border-radius:8px;
}

.row{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin:10px;
}

button{
font-size:20px;
padding:14px 18px;
min-width:170px;
border-radius:12px;
border:none;
cursor:pointer;
}

.blue{background:#1f4f7a;color:white;}
.green{background:#1f7a1f;color:white;}
.orange{background:#b36b00;color:white;}
.red{background:#7a1f1f;color:white;}

#timer{
font-size:40px;
margin:10px;
}

canvas{
max-width:95%;
background:#111;
border-radius:10px;
}
</style>
</head>

<body>

<h1>Roast Mode Pro</h1>
<div id="version">v2.0 VOICE CORE</div>

<div id="status">Ready</div>

<div class="row">
<button class="blue" onclick="initVoice()">Init Voice</button>
<button class="green" onclick="startRoast()">Start Roast</button>
<button class="orange" onclick="markFirstCrack()">First Crack</button>
<button class="red" onclick="endRoast()">End Roast</button>
</div>

<div id="timer">00:00</div>

<canvas id="chart"></canvas>

<script>

let recognition = null;
let listening = false;

let startTime = 0;
let fcTime = null;
let endTime = null;
let timer = null;
let temperature = null;

let chart = null;

/* INIT */
window.onload = function(){

chart = new Chart(
document.getElementById("chart"),
{
type:"line",
data:{
labels:[],
datasets:[{data:[],borderColor:"#ffcc00"}]
}
}
);

document.getElementById("status").innerText="Ready";
};

/* TIMER */
function startTimer(){
clearInterval(timer);
timer = setInterval(()=>{
if(!startTime)return;
let s = Math.floor((Date.now()-startTime)/1000);
document.getElementById("timer").innerText =
Math.floor(s/60)+":"+String(s%60).padStart(2,"0");
},1000);
}

/* VOICE INIT */
function initVoice(){

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if(!SR){
alert("Speech not supported");
return;
}

recognition = new SR();
recognition.lang = "en-US";
recognition.continuous = true;

recognition.onresult = (e)=>{
const text = e.results[e.results.length-1][0].transcript.toLowerCase();
document.getElementById("status").innerText = "Heard: " + text;

/* TEMPERATURE */
if(text.includes("temperature") || text.includes("temp")){
let num = text.match(/\d+/);
if(num){
temperature = num[0];
document.getElementById("status").innerText =
"Temp set: " + temperature;
}
}

/* FIRST CRACK */
if(text.includes("first crack")){
markFirstCrack();
}

/* END ROAST */
if(text.includes("end roast")){
endRoast();
}
};

recognition.start();
listening = true;

document.getElementById("status").innerText="Voice active";
}

/* START ROAST */
function startRoast(){

startTime = Date.now();
fcTime = null;
endTime = null;
temperature = null;

startTimer();

/* IMPORTANT: no prompt anymore */

document.getElementById("status").innerText =
"Roast started. Say temperature...";
}

/* FIRST CRACK */
function markFirstCrack(){
if(!startTime)return;
fcTime = Date.now();
document.getElementById("status").innerText="First Crack";
}

/* END ROAST */
function endRoast(){
endTime = Date.now();
document.getElementById("status").innerText =
"Complete. Temp: " + temperature;
}

</script>

</body>
</html>

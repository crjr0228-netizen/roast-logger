<!DOCTYPE html>
<html>
<head>
  <title>Roast Logger Pro</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h1>Roast Logger Pro</h1>

<div id="status">Tap Initialize Voice</div>

<div class="row">
  <button onclick="initVoice()" class="gray">Initialize Voice</button>
</div>

<div class="row">
  <button id="startBtn" onclick="startRoast()" class="green" disabled>Start Roast</button>
  <button onclick="markFirstCrackManual()" class="orange">First Crack</button>
  <button onclick="stopRoast()" class="red">Stop Roast</button>
</div>

<div id="timer">00:00</div>

<div class="stats">
  <div id="temp">Temp: --</div>
  <div id="ror">RoR: --</div>
</div>

<canvas id="chart"></canvas>

<!-- Dev strip (original-style display) -->
<div id="devStrip"></div>

<div id="summary">
  <h2>Roast Summary</h2>

  <div class="grid">
    <div>📅 Date: <span id="date">--</span></div>
    <div>☕ Bean: <input id="bean"></div>
    <div>🌱 Green Weight (g): <input id="green"></div>
    <div>🔥 Roast Weight (g): <input id="roast"></div>

    <div>📉 Weight Loss: <span id="loss">--</span></div>
    <div>⏱ Dev %: <span id="devPct">--</span></div>

    <div>🌋 First Crack: <span id="fcTime">--</span></div>
    <div>⏳ Total Time: <span id="totalTime">--</span></div>
    <div>🔥 Dev Time: <span id="devTime">--</span></div>
  </div>
</div>

<script src="app.js"></script>

</body>
</html>

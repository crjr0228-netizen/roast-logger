<!DOCTYPE html>
<html>
<head>
  <title>Roast Logger Pro</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h1>Roast Logger Pro</h1>

<div id="status">Tap Initialize Voice</div>

<div class="row">
  <button onclick="initVoice()" class="gray">Initialize Voice</button>
</div>

<div class="row">
  <button id="startBtn" onclick="startRoast()" class="green" disabled>Start Roast</button>
  <button onclick="markFirstCrackManual()" class="orange">First Crack</button>
  <button onclick="stopRoast()" class="red">Stop Roast</button>
</div>

<div id="timer">00:00</div>

<div class="stats">
  <div id="temp">Temp: --</div>
  <div id="ror">RoR: --</div>
</div>

<canvas id="chart"></canvas>

<script src="app.js"></script>

</body>
</html>

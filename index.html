<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Roast Mode Pro (v3)</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0b0b;
      color: white;
      text-align: center;
    }

    h1 {
      margin: 10px;
    }

    #version {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 5px;
    }

    #status {
      font-size: 14px;
      margin: 8px;
      padding: 8px;
      background: #111;
      border-radius: 8px;
      color: #ddd;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin: 10px;
    }

    button {
      font-size: 22px;
      padding: 16px 22px;
      min-width: 180px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
    }

    .green { background: #1f7a1f; color: white; }
    .orange { background: #b36b00; color: white; }
    .red { background: #7a1f1f; color: white; }
    .blue { background: #1f4f7a; color: white; }

    #timer {
      font-size: 40px;
      margin: 10px;
    }

    canvas {
      max-width: 95%;
      background: #111;
      border-radius: 10px;
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      max-width: 560px;
      margin: 20px auto;
      padding: 15px;
      background: #111;
      border-radius: 12px;
    }

    .meta input {
      width: 100%;
      padding: 12px;
      font-size: 14px;
      border-radius: 10px;
      border: none;
      background: #1b1b1b;
      color: white;
      box-sizing: border-box;
    }
  </style>
</head>

<body>

<h1>Roast Mode Pro</h1>
<div id="version">v3</div>

<div id="status">Loading...</div>

<div class="row">
  <button class="blue" onclick="initVoice()">Initialize Voice</button>
  <button class="green" onclick="startRoast()">Start Roast</button>
  <button class="orange" onclick="markFirstCrack()">First Crack</button>
  <button class="red" onclick="stopRoast()">Drop</button>
</div>

<div id="timer">00:00</div>

<canvas id="chart"></canvas>

<div class="meta">
  <input id="bean" placeholder="Bean Type">
  <input id="date" placeholder="Date">
  <input id="green" placeholder="Green Weight (g)">
  <input id="roast" placeholder="Roast Weight (g)">
  <input id="loss" placeholder="Weight Loss %" disabled>
</div>

<div>
  <div>FC: <span id="fc">--</span></div>
  <div>Dev Time: <span id="dev">--</span></div>
  <div>Dev %: <span id="devPct">--</span></div>
</div>

<script>
/* =========================
   STATE
========================= */
let startTime = 0;
let firstCrackTime = null;
let dropTime = null;
let recognition = null;
let voiceReady = false;
let roastInterval = null;
let chart = null;

/* =========================
   STATUS
========================= */
function setStatus(msg) {
  document.getElementById("status").innerText = msg;
  console.log(msg);
}

/* =========================
   INIT (SAFE BOOT)
========================= */
window.onload = function () {
  try {
    document.getElementById("date").value =
      new Date().toLocaleDateString();

    const canvas = document.getElementById("chart");

    if (!canvas) {
      setStatus("ERROR: chart missing");
      return;
    }

    chart = new Chart(canvas.getContext("2d"), {
      type: "line",
      data: {
        labels: [],
        datasets: [{
          label: "Temp",
          data: [],
          borderColor: "#ffcc00",
          tension: 0.3
        }]
      }
    });

    setStatus("Ready");

  } catch (err) {
    setStatus("INIT ERROR: " + err.message);
  }
};

/* =========================
   VOICE
========================= */
function initVoice() {
  try {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SR) {
      setStatus("Speech not supported");
      return;
    }

    recognition = new SR();
    recognition.lang = "en-US";
    recognition.interimResults = false;

    recognition.onstart = () => setStatus("Voice active");

    recognition.onresult = (e) => {
      const text = e.results[0][0].transcript.toLowerCase();
      setStatus("Heard: " + text);

      if (text.includes("first crack")) {
        markFirstCrack();
      }

      const m = text.match(/\d+/);
      if (m && startTime) {
        logTemp(parseInt(m[0]));
      }
    };

    recognition.onerror = (e) => {
      setStatus("Voice error: " + e.error);
    };

    recognition.onend = () => {
      if (voiceReady) recognition.start();
    };

    recognition.start();
    voiceReady = true;

    setStatus("Voice initialized");

  } catch (err) {
    setStatus("Voice init failed: " + err.message);
  }
}

/* =========================
   ROAST CONTROL
========================= */
function startRoast() {
  try {
    if (!chart) {
      setStatus("Chart not ready");
      return;
    }

    startTime = Date.now();
    firstCrackTime = null;
    dropTime = null;

    chart.data.labels = [];
    chart.data.datasets[0].data = [];
    chart.update();

    clearInterval(roastInterval);

    roastInterval = setInterval(() => {
      speak("Temperature check");
    }, 30000);

    setStatus("Roast started");

  } catch (err) {
    setStatus("Start error: " + err.message);
  }
}

function markFirstCrack() {
  if (!startTime) return;

  firstCrackTime = Date.now();

  const fc = (firstCrackTime - startTime) / 1000;
  document.getElementById("fc").innerText = format(fc);

  setStatus("First crack recorded");
}

function stopRoast() {
  dropTime = Date.now();
  clearInterval(roastInterval);

  const total = (dropTime - startTime) / 1000;
  const dev = firstCrackTime ? (dropTime - firstCrackTime) / 1000 : 0;

  document.getElementById("dev").innerText = format(dev);
  document.getElementById("devPct").innerText =
    firstCrackTime ? ((dev / total) * 100).toFixed(1) + "%" : "--";

  updateWeightLoss();
  setStatus("Roast complete");
}

/* =========================
   TEMP LOGGING
========================= */
function logTemp(temp) {
  const t = (Date.now() - startTime) / 1000;

  chart.data.labels.push(Math.floor(t));
  chart.data.datasets[0].data.push(temp);
  chart.update();
}

/* =========================
   WEIGHT LOSS
========================= */
function updateWeightLoss() {
  const g = parseFloat(document.getElementById("green").value);
  const r = parseFloat(document.getElementById("roast").value);

  if (!g || !r) return;

  const loss = ((g - r) / g) * 100;
  document.getElementById("loss").value = loss.toFixed(1);
}

/* =========================
   SPEECH
========================= */
function speak(text) {
  try {
    speechSynthesis.cancel();
    speechSynthesis.speak(new SpeechSynthesisUtterance(text));
  } catch (e) {}
}

/* =========================
   FORMAT
========================= */
function format(sec) {
  sec = Math.floor(sec);
  return `${Math.floor(sec / 60)}:${String(sec % 60).padStart(2, "0")}`;
}
</script>

</body>
</html>

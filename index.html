<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Roast OS Pro v1</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
text-align:center;
}

h1{margin:10px;}

#status{
margin:10px;
padding:8px;
background:#111;
border-radius:8px;
}

#tempDisplay{
font-size:22px;
margin:5px;
color:#ffcc00;
}

button{
font-size:18px;
padding:12px 18px;
margin:5px;
border:none;
border-radius:10px;
cursor:pointer;
}

.green{background:#1f7a1f;color:white;}
.blue{background:#1f4f7a;color:white;}
.red{background:#7a1f7a;color:white;}

#timer{
font-size:40px;
margin:10px;
}

canvas{
max-width:95%;
background:#111;
border-radius:10px;
}
</style>
</head>

<body>

<h1>Roast OS Pro v200</h1>

<div id="status">Ready</div>
<div id="tempDisplay">Temp: --</div>

<button class="green" onclick="initVoice()">Initialize Voice</button>
<button class="blue" onclick="startRoast()">Start Roast</button>
<button class="red" onclick="stopRoast()">End Roast</button>

<div id="timer">00:00</div>

<canvas id="chart"></canvas>

<script>

let recognition;
let voiceReady = false;
let voiceActive = false;
let listening = false;

let chart;
let startTime = 0;
let uiTimer;
let roastTimer;

window.onload = function () {

chart = new Chart(document.getElementById("chart"), {
type: "line",
data: {
labels: [],
datasets: [
{ label:"Temp", data:[], borderColor:"#ffcc00", fill:false },
{ label:"RoR", data:[], borderColor:"#ff4444", fill:false }
]
}
});

};

/* ================= VOICE ================= */
function initVoice(){

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if (!SpeechRecognition) {
alert("Speech not supported");
return;
}

recognition = new SpeechRecognition();
recognition.lang = "en-US";
recognition.continuous = true;

recognition.onresult = (event) => {
const text = event.results[event.results.length - 1][0].transcript;
handleSpeech(text);
};

recognition.onend = () => {
if (voiceActive) recognition.start();
};

recognition.start();

voiceActive = true;
voiceReady = true;

document.getElementById("status").innerText = "Voice ready";
}

/* ================= START ROAST ================= */
function startRoast(){

startTime = Date.now();

uiTimer = setInterval(() => {
let t = Math.floor((Date.now() - startTime)/1000);
document.getElementById("timer").innerText =
Math.floor(t/60)+":"+String(t%60).padStart(2,"0");
},1000);

/* CRITICAL LOOP RESTORED */
roastTimer = setInterval(() => {
askTemperature();
}, 30000);

document.getElementById("status").innerText = "Running";
}

/* ================= ASK TEMP ================= */
function askTemperature(){
if (!voiceReady || listening) return;

document.getElementById("status").innerText = "Say temperature...";
speak("Temperature");

setTimeout(() => {
listenOnce();
}, 200);
}

/* ================= LISTEN ONCE ================= */
function listenOnce(){

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const rec = new SpeechRecognition();
rec.lang = "en-US";

listening = true;

rec.onresult = (e) => {
handleSpeech(e.results[0][0].transcript);
};

rec.onend = () => {
listening = false;
};

rec.start();
}

/* ================= SPEECH HANDLER ================= */
function handleSpeech(text){

text = text.toLowerCase();

let temp = parseNumber(text);

if (temp !== null) {
logTemp(temp);
document.getElementById("tempDisplay").innerText = "Temp: " + temp;
document.getElementById("status").innerText = "Logged: " + temp;
} else {
document.getElementById("status").innerText = "Heard: " + text;
}
}

/* ================= LOG TEMP ================= */
function logTemp(temp){

let t = Math.floor((Date.now()-startTime)/1000);

chart.data.labels.push(t);
chart.data.datasets[0].data.push(temp);

let temps = chart.data.datasets[0].data;
let times = chart.data.labels;

let ror = 0;
if (temps.length>1){
let dt = times[times.length-1]-times[times.length-2];
let dT = temps[temps.length-1]-temps[temps.length-2];
ror = dt ? dT/dt : 0;
}

chart.data.datasets[1].data.push(ror);
chart.update();
}

/* ================= STOP ================= */
function stopRoast(){
voiceActive = false;
clearInterval(uiTimer);
clearInterval(roastTimer);
document.getElementById("status").innerText = "Stopped";
}

/* ================= PARSER ================= */
function parseNumber(text){
let m = text.match(/\d+/g);
return m ? parseInt(m[m.length-1]) : null;
}

/* ================= SPEAK ================= */
function speak(text){
speechSynthesis.cancel();
speechSynthesis.speak(new SpeechSynthesisUtterance(text));
}

</script>

</body>
</html>

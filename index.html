<!DOCTYPE html>
<html>
<head>
  <title>Roast Mode Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0b0b;
      color: white;
      text-align: center;
    }

    h1 { margin: 10px; }

    .row {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin: 10px;
    }

    button {
      font-size: 22px;
      padding: 16px 22px;
      min-width: 180px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
    }

    .green { background: #1f7a1f; color: white; }
    .orange { background: #b36b00; color: white; }
    .red { background: #7a1f1f; color: white; }
    .blue { background: #1f4f7a; color: white; }

    canvas {
      max-width: 95%;
      background: #111;
      border-radius: 10px;
    }

    #devStrip {
      margin: 10px;
      padding: 10px;
      background: #111;
      border-radius: 8px;
      font-size: 14px;
      color: #ddd;
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
      max-width: 500px;
      margin: 10px auto;
      text-align: left;
    }

    .meta input {
      width: 100%;
      padding: 8px;
      font-size: 14px;
      border-radius: 6px;
      border: none;
    }

    #timer {
      font-size: 40px;
      margin: 10px;
    }
  </style>
</head>

<body>

<h1>Roast Mode Pro</h1>

<div class="row">
  <button class="blue" onclick="initVoice()">Initialize Voice</button>
  <button class="green" onclick="startRoast()">Start Roast</button>
  <button class="orange" onclick="markFirstCrack()">First Crack</button>
  <button class="red" onclick="stopRoast()">Drop</button>
</div>

<div id="timer">00:00</div>

<canvas id="chart"></canvas>

<div id="devStrip">Waiting for First Crack...</div>

<!-- 🔥 RESTORED METADATA PANEL -->
<div class="meta">
  <input id="bean" placeholder="Bean Type">
  <input id="date" placeholder="Date">
  <input id="green" placeholder="Green Weight (g)">
  <input id="roast" placeholder="Roast Weight (g)">
  <input id="loss" placeholder="Weight Loss %" disabled>
</div>

<div>
  <div>FC: <span id="fc">--</span></div>
  <div>Dev Time: <span id="dev">--</span></div>
  <div>Dev %: <span id="devPct">--</span></div>
</div>

<script>
let startTime = 0;
let firstCrackTime = null;
let dropTime = null;

let recognition = null;
let voiceReady = false;
let roastInterval = null;

// auto-fill date
document.getElementById("date").value =
  new Date().toLocaleDateString();


// ---------------- CHART ----------------

const ctx = document.getElementById("chart").getContext("2d");

const chart = new Chart(ctx, {
  type: "line",
  data: {
    labels: [],
    datasets: [{
      label: "Temp",
      data: [],
      borderColor: "#ffcc00",
      tension: 0.3
    }]
  }
});


// ---------------- VOICE ----------------

function initVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SR) return alert("Speech not supported");

  recognition = new SR();
  recognition.lang = "en-US";
  recognition.interimResults = false;

  recognition.onresult = (e) => {
    const text = e.results[0][0].transcript.toLowerCase();

    if (text.includes("first crack")) {
      markFirstCrack();
    }

    const m = text.match(/\d+/);
    if (m && startTime) logTemp(parseInt(m[0]));
  };

  recognition.start();
  voiceReady = true;

  document.getElementById("devStrip").innerText =
    "Voice Ready";
}


// ---------------- START ----------------

function startRoast() {
  startTime = Date.now();
  firstCrackTime = null;
  dropTime = null;

  chart.data.labels = [];
  chart.data.datasets[0].data = [];
  chart.update();

  roastInterval = setInterval(() => {
    speak("Temperature check");
  }, 30000);
}


// ---------------- FIRST CRACK ----------------

function markFirstCrack() {
  if (!startTime) return;

  firstCrackTime = Date.now();

  const fc = (firstCrackTime - startTime) / 1000;
  document.getElementById("fc").innerText = format(fc);

  updateDevStrip();
}


// ---------------- DROP ----------------

function stopRoast() {
  dropTime = Date.now();

  clearInterval(roastInterval);

  const total = (dropTime - startTime) / 1000;
  const dev = firstCrackTime
    ? (dropTime - firstCrackTime) / 1000
    : 0;

  document.getElementById("dev").innerText = format(dev);
  document.getElementById("devPct").innerText =
    firstCrackTime ? ((dev / total) * 100).toFixed(1) + "%" : "--";

  updateWeightLoss();
  updateDevStrip();
}


// ---------------- DEV STRIP ----------------

function updateDevStrip() {
  if (!firstCrackTime) return;

  const devSec = ((dropTime || Date.now()) - firstCrackTime) / 1000;

  const milestones = [15, 17.5, 20, 22.5, 25];

  document.getElementById("devStrip").innerText =
    milestones.map(p =>
      `${p}% (${format((p / 100) * devSec)})`
    ).join(" | ");
}


// ---------------- TEMP ----------------

function logTemp(temp) {
  const t = (Date.now() - startTime) / 1000;

  chart.data.labels.push(Math.floor(t));
  chart.data.datasets[0].data.push(temp);
  chart.update();
}


// ---------------- WEIGHT LOSS ----------------

function updateWeightLoss() {
  const green = parseFloat(document.getElementById("green").value);
  const roast = parseFloat(document.getElementById("roast").value);

  if (!green || !roast) return;

  const loss = ((green - roast) / green) * 100;

  document.getElementById("loss").value =
    loss.toFixed(1);
}


// ---------------- SPEAK ----------------

function speak(t) {
  speechSynthesis.cancel();
  speechSynthesis.speak(new SpeechSynthesisUtterance(t));
}


// ---------------- FORMAT ----------------

function format(sec) {
  sec = Math.floor(sec);
  return `${Math.floor(sec / 60)}:${String(sec % 60).padStart(2,"0")}`;
}
</script>

</body>
</html>

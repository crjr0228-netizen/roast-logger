<!DOCTYPE html>
<html>
<head>
  <title>Roast Mode Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    h1 { margin: 10px 0; }

    #timer {
      font-size: 64px;
      font-weight: bold;
      margin: 5px;
    }

    #countdown {
      font-size: 20px;
      color: #aaa;
    }

    button, input {
      font-size: 18px;
      padding: 12px;
      margin: 5px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #333;
      color: white;
    }

    button:hover {
      background: #555;
    }

    input {
      width: 120px;
      text-align: center;
    }

    .stats {
      display: flex;
      justify-content: space-around;
      margin: 10px;
    }

    canvas {
      max-width: 95%;
      background: #1a1a1a;
      border-radius: 10px;
      margin-top: 10px;
    }

    #status {
      color: #aaa;
      margin: 10px;
    }
  </style>
</head>

<body>

<h1>Roast Mode Pro</h1>

<div id="timer">00:00</div>
<div id="countdown">Next reading in: 30s</div>

<button onclick="startRoast()">Start</button>
<button onclick="stopRoast()">Stop</button>
<button onclick="downloadCSV()">Export CSV</button>

<br>

<input id="manualTemp" placeholder="Temp">
<button onclick="submitManual()">Add</button>

<div class="stats">
  <div id="temp">Temp: --</div>
  <div id="ror">RoR: --</div>
  <div id="dev">Dev: --</div>
</div>

<p id="status">Ready</p>

<canvas id="chart"></canvas>

<script>
let data = [];
let seconds = 0;
let totalSeconds = 0;

let timer;
let timerInterval;
let countdownTimer;

let countdown = 30;
let state = "READY";
let listening = false;

let events = { first:null, second:null, yellow:null };

const ctx = document.getElementById('chart').getContext('2d');

const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: [],
    datasets: [
      { label: 'Temp', data: [], tension: 0.25 },
      { label: 'RoR', data: [], tension: 0.25 },
      { label: 'Events', data: [], showLine: false, pointRadius: 6 }
    ]
  }
});


// ---------------- START / STOP ----------------

function startRoast() {
  data = [];
  seconds = 0;
  totalSeconds = 0;
  countdown = 30;
  state = "READY";
  events = { first:null, second:null, yellow:null };

  chart.data.labels = [];
  chart.data.datasets.forEach(d => d.data = []);
  chart.update();

  timer = setInterval(() => {
    seconds += 30;
    ask();
    resetCountdown();
  }, 30000);

  timerInterval = setInterval(() => {
    totalSeconds++;
    updateTimer();
  }, 1000);

  countdownTimer = setInterval(() => {
    countdown--;
    if (countdown <= 0) countdown = 30;
    updateCountdown();
  }, 1000);

  ask();
}

function stopRoast() {
  clearInterval(timer);
  clearInterval(timerInterval);
  clearInterval(countdownTimer);
  speak("Roast complete");
}


// ---------------- TIMER UI ----------------

function updateTimer() {
  let m = Math.floor(totalSeconds / 60);
  let s = totalSeconds % 60;

  document.getElementById("timer").innerText =
    String(m).padStart(2,'0') + ":" + String(s).padStart(2,'0');
}

function updateCountdown() {
  document.getElementById("countdown").innerText =
    "Next reading in: " + countdown + "s";
}

function resetCountdown() {
  countdown = 30;
  updateCountdown();
}


// ---------------- ROAST FLOW ----------------

function ask() {
  if (state !== "READY") return;

  state = "ASKING";

  speak("Temperature check");

  setTimeout(() => {
    state = "LISTENING";
    listen(handleSpeech);

    // auto-skip safety
    setTimeout(() => {
      if (state === "LISTENING") {
        document.getElementById("status").innerText = "No input (skipped)";
        state = "READY";
      }
    }, 8000);

  }, 600);
}

function handleSpeech(text) {
  state = "PROCESSING";

  if (!text) {
    state = "READY";
    return;
  }

  let t = text.toLowerCase();

  detectEvent(t);

  let temp = parseNumber(t);

  if (temp !== null) {
    logTemp(temp);
  } else {
    document.getElementById("status").innerText = "No temp detected";
  }

  state = "READY";
}


// ---------------- EVENTS ----------------

function detectEvent(text) {
  if (text.includes("first crack")) confirmEvent("first");
  if (text.includes("second crack")) confirmEvent("second");
  if (text.includes("yellow")) confirmEvent("yellow");
}

function confirmEvent(type) {
  speak("Did you say " + type + "?");

  listen(resp => {
    if (resp.toLowerCase().includes("yes")) {
      markEvent(type);
    }
  });
}

function markEvent(type) {
  events[type] = seconds;

  let lastTemp = data[data.length-1]?.temp || 0;

  chart.data.datasets[2].data.push({
    x: seconds + "s",
    y: lastTemp
  });

  chart.update();

  document.getElementById("status").innerText =
    type + " marked";
}


// ---------------- DATA LOGGING ----------------

function logTemp(temp) {
  data.push({ time: seconds, temp });

  document.getElementById("temp").innerText = "Temp: " + temp;

  chart.data.labels.push(seconds + "s");
  chart.data.datasets[0].data.push(temp);

  updateRoR();
  updateDev();

  chart.update();
}


// ---------------- ANALYTICS ----------------

function updateRoR() {
  if (data.length < 2) return;

  let a = data[data.length-1];
  let b = data[data.length-2];

  let ror = (a.temp - b.temp) / 0.5;

  chart.data.datasets[1].data.push(ror);

  document.getElementById("ror").innerText =
    "RoR: " + ror.toFixed(1);
}

function updateDev() {
  if (!events.first) return;

  let dev = seconds - events.first;
  let pct = (dev / seconds) * 100;

  document.getElementById("dev").innerText =
    "Dev: " + pct.toFixed(1) + "%";
}


// ---------------- INPUT ----------------

function submitManual() {
  let v = parseInt(document.getElementById("manualTemp").value);
  if (!isNaN(v)) logTemp(v);
}


// ---------------- EXPORT ----------------

function downloadCSV() {
  let csv = "Time,Temp\n";
  data.forEach(d => csv += `${d.time},${d.temp}\n`);

  let blob = new Blob([csv], { type: 'text/csv' });
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "roast.csv";
  a.click();
}


// ---------------- VOICE ----------------

function listen(cb) {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  const rec = new SpeechRecognition();

  rec.lang = "en-US";
  rec.interimResults = false;

  rec.onresult = e => cb(e.results[0][0].transcript);
  rec.onerror = () => { state = "READY"; };
  rec.onend = () => { listening = false; };

  rec.start();
}

function speak(text) {
  speechSynthesis.speak(new SpeechSynthesisUtterance(text));
}


// ---------------- PARSER ----------------

function parseNumber(text) {
  if (text.match(/\d+/)) return parseInt(text.match(/\d+/)[0]);

  const map = {
    one:1,two:2,three:3,four:4,five:5,six:6,seven:7,eight:8,nine:9,
    ten:10,twenty:20,thirty:30,forty:40,fifty:50,
    sixty:60,seventy:70,eighty:80,ninety:90,hundred:100
  };

  let total = 0;

  text.split(" ").forEach(w => {
    if (map[w]) {
      if (map[w] === 100) total *= 100;
      else total += map[w];
    }
  });

  return total || null;
}

</script>
</body>
</html>

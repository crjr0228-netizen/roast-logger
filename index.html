<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Roast OS Pro v1.2</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
text-align:center;
}

h1{margin:10px;}

#status{
margin:10px;
padding:8px;
background:#111;
border-radius:8px;
}

#tempDisplay{
font-size:22px;
margin:5px;
color:#ffcc00;
}

.row{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin:10px;
}

button{
font-size:18px;
padding:12px 16px;
border:none;
border-radius:10px;
cursor:pointer;
}

.blue{background:#1f4f7a;color:white;}
.green{background:#1f7a1f;color:white;}
.orange{background:#b36b00;color:white;}
.red{background:#7a1f7a;color:white;}

#timer{
font-size:40px;
margin:10px;
}

canvas{
max-width:95%;
background:#111;
border-radius:10px;
}
</style>
</head>

<body>

<h1>Roast OS Pro v1.2</h1>

<div id="status">Ready</div>
<div id="tempDisplay">Temp: --</div>

<div class="row">
<button class="blue" onclick="initVoice()">Voice</button>
<button class="green" onclick="startRoast()">Start Roast</button>
<button class="orange" onclick="firstCrack()">First Crack</button>
<button class="red" onclick="stopRoast()">End Roast</button>
</div>

<div id="timer">00:00</div>

<canvas id="chart"></canvas>

<script>

let recognition;
let chart;

let startTime = 0;
let timer;
let beepTimer;
let session = false;

let wakeLock = null;

/* ================= WAKE LOCK ================= */
async function enableWakeLock(){
try {
if ("wakeLock" in navigator) {
wakeLock = await navigator.wakeLock.request("screen");
wakeLock.addEventListener("release", () => {
console.log("Wake Lock released");
});
}
} catch (e) {
console.log("WakeLock error:", e);
}
}

/* ================= INIT ================= */
window.onload = function(){

chart = new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:[],
datasets:[
{label:"Temp",data:[],borderColor:"#ffcc00",fill:false},
{label:"RoR",data:[],borderColor:"#ff4444",fill:false}
]
}
});

};

/* ================= VOICE ================= */
function initVoice(){

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
recognition = new SR();

recognition.lang = "en-US";
recognition.continuous = true;

recognition.onresult = (e)=>{
const text = e.results[e.results.length-1][0].transcript.toLowerCase();
handleSpeech(text);
};

recognition.onend = ()=>{ if(session) recognition.start(); };

recognition.start();

document.getElementById("status").innerText="Voice Ready";
}

/* ================= START ROAST ================= */
function startRoast(){

session = true;
startTime = Date.now();

document.getElementById("status").innerText="Running";

enableWakeLock();

/* timer */
timer = setInterval(()=>{
let t = Math.floor((Date.now()-startTime)/1000);
document.getElementById("timer").innerText =
Math.floor(t/60)+":"+String(t%60).padStart(2,"0");
},1000);

/* 🔔 30 SECOND BEEP LOOP */
beepTimer = setInterval(()=>{
beep();
},30000);

}

/* ================= BEEP ================= */
function beep(){

let ctx = new (window.AudioContext || window.webkitAudioContext)();
let osc = ctx.createOscillator();

osc.type = "sine";
osc.frequency.value = 880;

osc.connect(ctx.destination);
osc.start();
osc.stop(ctx.currentTime + 0.15);

document.getElementById("status").innerText="BEEP";
}

/* ================= SPEECH ================= */
function handleSpeech(text){

let temp = parseNumber(text);

if(temp !== null){
logTemp(temp);
document.getElementById("tempDisplay").innerText="Temp: "+temp;
document.getElementById("status").innerText="Logged "+temp;
}
}

/* ================= LOG ================= */
function logTemp(temp){

let t = Math.floor((Date.now()-startTime)/1000);

chart.data.labels.push(t);
chart.data.datasets[0].data.push(temp);

/* RoR */
let temps = chart.data.datasets[0].data;
let times = chart.data.labels;

let ror = 0;

if(temps.length>1){
let dt = times[times.length-1]-times[times.length-2];
let dT = temps[temps.length-1]-temps[temps.length-2];
ror = dt ? dT/dt : 0;
}

chart.data.datasets[1].data.push(ror);
chart.update();
}

/* ================= FIRST CRACK ================= */
function firstCrack(){
document.getElementById("status").innerText="First Crack 🔥";
}

/* ================= STOP ================= */
function stopRoast(){
session=false;
clearInterval(timer);
clearInterval(beepTimer);

if (wakeLock) wakeLock.release();

document.getElementById("status").innerText="Stopped";
}

/* ================= PARSER ================= */
function parseNumber(text){
let m = text.match(/\d+/g);
return m ? parseInt(m[m.length-1]) : null;
}

</script>

</body>
</html>

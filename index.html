<!DOCTYPE html>
<html>
<head>
  <title>Roast Logger v5</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #121212;
      color: #fff;
      text-align: center;
    }

    h1 { margin: 10px 0; }

    #timer {
      font-size: 64px;
      font-weight: bold;
      margin: 10px 0;
    }

    .controls button {
      font-size: 20px;
      padding: 15px 25px;
      margin: 5px;
      border-radius: 10px;
      border: none;
      background: #333;
      color: white;
    }

    .controls button:hover {
      background: #555;
    }

    .stats {
      display: flex;
      justify-content: space-around;
      margin: 15px 0;
      font-size: 18px;
    }

    .input-area {
      margin: 10px;
    }

    input {
      font-size: 20px;
      padding: 10px;
      width: 150px;
      text-align: center;
      border-radius: 8px;
      border: none;
    }

    canvas {
      max-width: 100%;
      background: #1e1e1e;
      border-radius: 10px;
      margin-top: 10px;
    }

    #status {
      margin-top: 10px;
      color: #aaa;
    }
  </style>
</head>
<body>

<h1>Roast Logger</h1>
<div id="timer">00:00</div>

<div class="controls">
  <button onclick="startRoast()">Start</button>
  <button onclick="stopRoast()">Stop</button>
  <button onclick="downloadCSV()">Export</button>
</div>

<div class="controls">
  <button onclick="markEvent('first')">First Crack</button>
  <button onclick="markEvent('second')">Second Crack</button>
  <button onclick="markEvent('yellow')">Yellow</button>
</div>

<div class="input-area">
  <input id="manualTemp" placeholder="Temp">
  <button onclick="submitManual()">Add</button>
</div>

<div class="stats">
  <div id="currentTemp">Temp: --</div>
  <div id="ror">RoR: --</div>
  <div id="devTime">Dev: --</div>
</div>

<p id="status">Ready</p>

<canvas id="chart"></canvas>

<script>
let data = [];
let seconds = 0;
let totalSeconds = 0;
let timer, timerInterval;
let listening = false;

let events = { first:null, second:null, yellow:null };

const ctx = document.getElementById('chart').getContext('2d');

const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: [],
    datasets: [
      { label: 'Temp', data: [], tension: 0.3 },
      { label: 'RoR', data: [], tension: 0.3 },
      { label: 'Events', data: [], showLine: false, pointRadius: 6 }
    ]
  }
});

function startRoast() {
  data = [];
  seconds = 0;
  totalSeconds = 0;
  events = { first:null, second:null, yellow:null };

  chart.data.labels = [];
  chart.data.datasets.forEach(d => d.data = []);
  chart.update();

  timer = setInterval(() => {
    seconds += 30;
    ask();
  }, 30000);

  timerInterval = setInterval(() => {
    totalSeconds++;
    updateTimer();
  }, 1000);

  ask();
}

function stopRoast() {
  clearInterval(timer);
  clearInterval(timerInterval);
  speak("Roast complete");
}

function updateTimer() {
  let m = Math.floor(totalSeconds / 60);
  let s = totalSeconds % 60;
  document.getElementById("timer").innerText =
    String(m).padStart(2,'0') + ":" + String(s).padStart(2,'0');
}

function ask() {
  if (listening) return;
  listening = true;

  speak("Temperature");

  listen(text => {
    let t = text.toLowerCase();

    detectEvent(t);

    let temp = parseNumber(t);
    if (temp !== null) logTemp(temp);

    listening = false;
  });
}

function detectEvent(text) {
  if (text.includes("first crack")) confirmEvent("first");
  if (text.includes("second crack")) confirmEvent("second");
  if (text.includes("yellow")) confirmEvent("yellow");
}

function confirmEvent(type) {
  speak("Confirm " + type);

  listen(resp => {
    if (resp.toLowerCase().includes("yes")) {
      markEvent(type);
    }
  });
}

function markEvent(type) {
  events[type] = seconds;

  let lastTemp = data[data.length-1]?.temp || 0;

  chart.data.datasets[2].data.push({
    x: seconds + "s",
    y: lastTemp
  });

  chart.update();
}

function logTemp(temp) {
  data.push({ time: seconds, temp });

  document.getElementById("currentTemp").innerText =
    "Temp: " + temp;

  chart.data.labels.push(seconds + "s");
  chart.data.datasets[0].data.push(temp);

  updateRoR();
  updateDevTime();

  chart.update();
}

function updateRoR() {
  if (data.length < 2) return;

  let last = data[data.length-1];
  let prev = data[data.length-2];

  let ror = (last.temp - prev.temp) / 0.5;

  chart.data.datasets[1].data.push(ror);

  document.getElementById("ror").innerText =
    "RoR: " + ror.toFixed(1);
}

function updateDevTime() {
  if (!events.first) return;

  let total = seconds;
  let dev = total - events.first;
  let percent = (dev / total) * 100;

  document.getElementById("devTime").innerText =
    "Dev: " + percent.toFixed(1) + "%";
}

function submitManual() {
  let val = parseInt(document.getElementById("manualTemp").value);
  if (!isNaN(val)) logTemp(val);
}

function downloadCSV() {
  let csv = "Time,Temp\n";
  data.forEach(d => csv += `${d.time},${d.temp}\n`);

  let blob = new Blob([csv], { type: 'text/csv' });
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "roast.csv";
  a.click();
}

function listen(cb) {
  const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  rec.onresult = e => cb(e.results[0][0].transcript);
  rec.start();
}

function speak(text) {
  speechSynthesis.speak(new SpeechSynthesisUtterance(text));
}

function parseNumber(text) {
  if (text.match(/\d+/)) return parseInt(text.match(/\d+/)[0]);

  const map = {
    one:1,two:2,three:3,four:4,five:5,six:6,seven:7,eight:8,nine:9,
    ten:10,twenty:20,thirty:30,forty:40,fifty:50,
    sixty:60,seventy:70,eighty:80,ninety:90,hundred:100
  };

  let total = 0;
  text.split(" ").forEach(w => {
    if (map[w]) {
      if (map[w] === 100) total *= 100;
      else total += map[w];
    }
  });

  return total || null;
}
</script>

</body>
</html>

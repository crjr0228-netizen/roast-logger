<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Roast Mode Pro (Stable Full Build)</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
text-align:center;
}

h1{margin:10px;}

#status{
margin:10px;
padding:8px;
background:#111;
border-radius:8px;
}

.row{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin:10px;
}

button{
font-size:20px;
padding:14px 18px;
min-width:170px;
border-radius:12px;
border:none;
cursor:pointer;
}

.blue{background:#1f4f7a;color:white;}
.green{background:#1f7a1f;color:white;}
.orange{background:#b36b00;color:white;}
.red{background:#7a1f7a;color:white;}

#timer{
font-size:40px;
margin:10px;
}

canvas{
max-width:95%;
background:#111;
border-radius:10px;
}
</style>
</head>

<body>

<h1>Roast Mode Pro v8</h1>
<div id="status">Ready</div>

<div class="row">
<button class="blue" onclick="initVoice()">Voice</button>
<button class="green" onclick="startRoast()">Start Roast</button>
<button class="orange" onclick="markFirstCrack()">First Crack</button>
<button class="red" onclick="endRoast()">End Roast</button>
</div>

<div id="timer">00:00</div>

<canvas id="chart"></canvas>

<script>

/* ================= STATE ================= */
let recognition = null;
let chart = null;

let startTime = 0;
let temp = 0;

let timerInterval = null;
let tempPromptInterval = null;

/* ================= INIT ================= */
window.onload = function () {

chart = new Chart(document.getElementById("chart"), {
type: "line",
data: {
labels: [],
datasets: [
{
label: "Temp",
data: [],
borderColor: "#ffcc00",
fill: false
},
{
label: "RoR",
data: [],
borderColor: "#ff4444",
fill: false
}
]
}
});

document.getElementById("status").innerText = "Ready";
};

/* ================= SPEECH ================= */
function speak(text){
window.speechSynthesis.cancel();
window.speechSynthesis.speak(new SpeechSynthesisUtterance(text));
}

/* ================= TIMER ================= */
function startTimer(){
clearInterval(timerInterval);

timerInterval = setInterval(() => {
if (!startTime) return;

let s = Math.floor((Date.now() - startTime) / 1000);

document.getElementById("timer").innerText =
Math.floor(s / 60) + ":" + String(s % 60).padStart(2, "0");

}, 1000);
}

/* ================= VOICE ================= */
function initVoice(){

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

if (!SR) {
alert("Speech not supported in this browser");
return;
}

recognition = new SR();
recognition.lang = "en-US";
recognition.continuous = true;

recognition.onresult = (e) => {
const text = e.results[e.results.length - 1][0].transcript.toLowerCase();

document.getElementById("status").innerText = "Heard: " + text;

/* TEMP CAPTURE */
if (text.includes("temp") || text.includes("temperature")) {
let n = text.match(/\d+/);
if (n) {
temp = parseInt(n[0]);
}
}

/* FIRST CRACK */
if (text.includes("first crack")) {
markFirstCrack();
}

/* END */
if (text.includes("end roast")) {
endRoast();
}
};

recognition.start();
document.getElementById("status").innerText = "Voice active";
speak("Voice system ready");
}

/* ================= START ROAST ================= */
function startRoast(){

startTime = Date.now();
temp = 0;

startTimer();

/* 30s VOICE PROMPT + CHART LOG */
clearInterval(tempPromptInterval);

tempPromptInterval = setInterval(() => {

let snapshot = temp; // CRITICAL FIX: freeze value at moment

speak("temperature");

logToChart(snapshot);

}, 30000);

speak("Roast started");
document.getElementById("status").innerText = "Running";
}

/* ================= CHART LOGGING ================= */
function logToChart(capturedTemp){

if (!startTime) return;

let t = Math.floor((Date.now() - startTime) / 1000);

/* TEMP SERIES */
chart.data.labels.push(t);
chart.data.datasets[0].data.push(capturedTemp);

/* ROR */
let ror = 0;

let temps = chart.data.datasets[0].data;
let times = chart.data.labels;

if (temps.length > 1) {

let dt = times[times.length - 1] - times[times.length - 2];
let dT = temps[temps.length - 1] - temps[temps.length - 2];

if (dt !== 0) {
ror = dT / dt;
}
}

chart.data.datasets[1].data.push(ror);

chart.update();
}

/* ================= FIRST CRACK ================= */
function markFirstCrack(){
document.getElementById("status").innerText = "First Crack";
speak("First crack");
}

/* ================= END ROAST ================= */
function endRoast(){

clearInterval(tempPromptInterval);

document.getElementById("status").innerText = "Complete";
speak("Roast complete");
}

</script>

</body>
</html>

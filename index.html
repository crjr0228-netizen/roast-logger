<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Roast Mode Pro (v5)</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0b0b;
      color: white;
      text-align: center;
    }

    h1 { margin: 10px; }

    #version {
      font-size: 14px;
      color: #888;
      margin-bottom: 5px;
    }

    #status {
      margin: 8px;
      padding: 8px;
      background: #111;
      border-radius: 8px;
      font-size: 14px;
    }

    #clock {
      font-size: 14px;
      color: #aaa;
    }

    .row {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin: 10px;
    }

    button {
      font-size: 22px;
      padding: 16px 22px;
      min-width: 180px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
    }

    .green { background: #1f7a1f; color: white; }
    .orange { background: #b36b00; color: white; }
    .red { background: #7a1f1f; color: white; }
    .blue { background: #1f4f7a; color: white; }

    #timer {
      font-size: 40px;
      margin: 10px;
    }

    canvas {
      max-width: 95%;
      background: #111;
      border-radius: 10px;
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      max-width: 560px;
      margin: 20px auto;
      padding: 15px;
      background: #111;
      border-radius: 12px;
    }

    .meta input {
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #1b1b1b;
      color: white;
    }
  </style>
</head>

<body>

<h1>Roast Mode Pro</h1>
<div id="version">v5</div>

<div id="clock"></div>
<div id="status">Loading...</div>

<div class="row">
  <button class="blue" onclick="initVoice()">Initialize Voice</button>
  <button class="green" onclick="startRoast()">Start Roast</button>
  <button class="orange" onclick="markFirstCrack()">First Crack</button>
  <button class="red" onclick="endRoast()">End Roast</button>
</div>

<div id="timer">00:00</div>

<canvas id="chart"></canvas>

<div class="meta">
  <input id="bean" placeholder="Bean Type">
  <input id="date" placeholder="Date">
  <input id="green" placeholder="Green Weight (g)">
  <input id="roast" placeholder="Roast Weight (g)">
  <input id="loss" placeholder="Weight Loss %" disabled>
</div>

<div>
  <div>FC: <span id="fc">--</span></div>
  <div>Dev Time: <span id="dev">--</span></div>
  <div>Dev %: <span id="devPct">--</span></div>
</div>

<script>
let startTime = 0;
let firstCrackTime = null;
let endTime = null;
let chart = null;
let timerInterval = null;

/* CLOCK */
setInterval(() => {
  document.getElementById("clock").innerText =
    "Clock: " + new Date().toLocaleTimeString();
}, 1000);

/* INIT */
window.onload = function () {
  document.getElementById("date").value =
    new Date().toLocaleDateString();

  chart = new Chart(
    document.getElementById("chart").getContext("2d"),
    {
      type: "line",
      data: {
        labels: [],
        datasets: [{
          label: "Temp",
          data: [],
          borderColor: "#ffcc00",
          tension: 0.3
        }]
      }
    }
  );

  document.getElementById("status").innerText = "Ready";
};

/* TIMER */
function startTimer() {
  clearInterval(timerInterval);

  timerInterval = setInterval(() => {
    if (!startTime) return;

    const s = Math.floor((Date.now() - startTime) / 1000);
    document.getElementById("timer").innerText =
      `${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;
  }, 1000);
}

/* VOICE (SAFE INIT) */
function initVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return alert("Speech not supported");

  const rec = new SR();
  rec.lang = "en-US";

  rec.onresult = (e) => {
    const text = e.results[0][0].transcript.toLowerCase();

    document.getElementById("status").innerText = "Heard: " + text;

    if (text.includes("first crack")) markFirstCrack();
  };

  rec.start();
}

/* START ROAST */
function startRoast() {
  startTime = Date.now();
  firstCrackTime = null;
  endTime = null;

  chart.data.labels = [];
  chart.data.datasets[0].data = [];
  chart.update();

  startTimer();

  document.getElementById("status").innerText = "Roast started";
}

/* FIRST CRACK */
function markFirstCrack() {
  if (!startTime) return;

  firstCrackTime = Date.now();

  const fc = (firstCrackTime - startTime) / 1000;
  document.getElementById("fc").innerText =
    format(fc);

  document.getElementById("status").innerText = "First crack";
}

/* END ROAST */
function endRoast() {
  endTime = Date.now();

  const total = (endTime - startTime) / 1000;
  const dev = firstCrackTime
    ? (endTime - firstCrackTime) / 1000
    : 0;

  document.getElementById("dev").innerText = format(dev);
  document.getElementById("devPct").innerText =
    firstCrackTime ? ((dev / total) * 100).toFixed(1) + "%" : "--";

  const g = parseFloat(document.getElementById("green").value);
  const r = parseFloat(document.getElementById("roast").value);

  if (g && r) {
    document.getElementById("loss").value =
      (((g - r) / g) * 100).toFixed(1);
  }

  document.getElementById("status").innerText = "Roast complete";
}

/* FORMAT */
function format(sec) {
  sec = Math.floor(sec);
  return `${Math.floor(sec/60)}:${String(sec%60).padStart(2,"0")}`;
}
</script>

</body>
</html>

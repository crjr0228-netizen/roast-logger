<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Roast Mode Pro (v1.3)</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
text-align:center;
}

h1{margin:10px;}

#version{
font-size:14px;
color:#888;
margin-bottom:5px;
}

#status{
margin:10px;
padding:8px;
background:#111;
border-radius:8px;
}

.row{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
margin:10px;
}

button{
font-size:20px;
padding:14px 18px;
min-width:170px;
border-radius:12px;
border:none;
cursor:pointer;
}

.green{background:#1f7a1f;color:white;}
.orange{background:#b36b00;color:white;}
.red{background:#7a1f1f;color:white;}
.blue{background:#1f4f7a;color:white;}

#timer{
font-size:40px;
margin:10px;
}

canvas{
max-width:95%;
background:#111;
border-radius:10px;
}
</style>
</head>

<body>

<h1>Roast Mode Pro</h1>
<div id="version">v1.4</div>

<div id="status">Ready</div>

<div class="row">
<button class="blue" onclick="initVoice()">Voice</button>
<button class="green" onclick="startRoast()">Start Roast</button>
<button class="orange" onclick="markFirstCrack()">First Crack</button>
<button class="red" onclick="endRoast()">End Roast</button>
</div>

<div id="timer">00:00</div>

<canvas id="chart"></canvas>

<script>

let startTime=0;
let fcTime=null;
let endTime=null;
let timerInterval=null;
let chart=null;
let recognition=null;

/* INIT */
window.onload=function(){

chart=new Chart(
document.getElementById("chart"),
{
type:"line",
data:{
labels:[],
datasets:[{
data:[],
borderColor:"#ffcc00"
}]
}
}
);

document.getElementById("status").innerText="Ready";
};

/* VOICE */
function initVoice(){

const SR=window.SpeechRecognition||window.webkitSpeechRecognition;

if(!SR){
alert("Speech not supported");
return;
}

recognition=new SR();
recognition.lang="en-US";

recognition.onresult=(e)=>{
const text=e.results[0][0].transcript.toLowerCase();
document.getElementById("status").innerText="Heard: "+text;

if(text.includes("first crack")){
markFirstCrack();
}
};

recognition.start();
document.getElementById("status").innerText="Voice active";
}

/* START ROAST (TEMP RESTORED) */
function startRoast(){

// 🔥 THIS IS THE ONLY RESTORED FEATURE
let temp = prompt("Enter temperature:");

startTime=Date.now();
fcTime=null;
endTime=null;

chart.data.labels=[];
chart.data.datasets[0].data=[];
chart.update();

startTimer();

document.getElementById("status").innerText=
"Roast started at " + temp + "°";
}

/* TIMER */
function startTimer(){

clearInterval(timerInterval);

timerInterval=setInterval(()=>{
if(!startTime)return;

let s=Math.floor((Date.now()-startTime)/1000);

document.getElementById("timer").innerText=
Math.floor(s/60)+":"+String(s%60).padStart(2,"0");

},1000);
}

/* FIRST CRACK */
function markFirstCrack(){
if(!startTime)return;

fcTime=Date.now();
document.getElementById("status").innerText="First Crack";
}

/* END ROAST */
function endRoast(){
endTime=Date.now();
document.getElementById("status").innerText="Roast complete";
}

</script>

</body>
</html>

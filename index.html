<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Roast Mode Pro (Stable Single File)</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
text-align:center;
}

h1{margin:10px;}

#status{
margin:10px;
padding:8px;
background:#111;
border-radius:8px;
}

#tempDisplay{
font-size:22px;
margin:5px;
color:#ffcc00;
}

.row{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin:10px;
}

button{
font-size:20px;
padding:14px 18px;
min-width:170px;
border-radius:12px;
border:none;
cursor:pointer;
}

.blue{background:#1f4f7a;color:white;}
.green{background:#1f7a1f;color:white;}
.orange{background:#b36b00;color:white;}
.red{background:#7a1f7a;color:white;}

#timer{
font-size:40px;
margin:10px;
}

canvas{
max-width:95%;
background:#111;
border-radius:10px;
}
</style>
</head>

<body>

<h1>Roast Mode Prov2.0</h1>

<div id="status">Ready</div>
<div id="tempDisplay">Temp: --</div>

<div class="row">
<button class="blue" onclick="initVoice()">Voice</button>
<button class="green" onclick="startRoast()">Start Roast</button>
<button class="orange" onclick="markFirstCrack()">First Crack</button>
<button class="red" onclick="endRoast()">End Roast</button>
</div>

<div id="timer">00:00</div>

<canvas id="chart"></canvas>

<script>

window.onerror = function(msg, src, line){
document.getElementById("status").innerText =
"JS ERROR: " + msg + " (line " + line + ")";
};

console.log("JS LOADED OK");

/* ================= STATE ================= */
let recognition;
let chart;

let sessionActive = false;
let startTime = 0;

let timerInterval = null;

/* ================= INIT ================= */
window.onload = function () {

try {

chart = new Chart(document.getElementById("chart"), {
type: "line",
data: {
labels: [],
datasets: [
{
label: "Temp",
data: [],
borderColor: "#ffcc00",
fill: false
},
{
label: "RoR",
data: [],
borderColor: "#ff4444",
fill: false
}
]
}
});

document.getElementById("status").innerText = "Ready";

} catch (e) {
document.getElementById("status").innerText = "INIT ERROR: " + e.message;
}
};

/* ================= START ROAST ================= */
function startRoast(){

try {

alert("START ROAST FIRED");

sessionActive = true;
startTime = Date.now();

document.getElementById("status").innerText = "Running";

startTimer();

} catch (e) {
document.getElementById("status").innerText = "START ERROR: " + e.message;
}
}

/* ================= TIMER ================= */
function startTimer(){

clearInterval(timerInterval);

timerInterval = setInterval(() => {

if (!sessionActive) return;

let s = Math.floor((Date.now() - startTime) / 1000);

document.getElementById("timer").innerText =
Math.floor(s / 60) + ":" + String(s % 60).padStart(2, "0");

}, 1000);
}

/* ================= VOICE ================= */
function initVoice(){

try {

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

recognition = new SR();
recognition.lang = "en-US";
recognition.continuous = true;

recognition.onresult = (e) => {

const text =
e.results[e.results.length - 1][0].transcript.toLowerCase();

document.getElementById("status").innerText = text;

let numbers = text.match(/\d+/g);

if ((text.includes("temp") || text.includes("temperature")) && numbers) {
commitTemp(parseInt(numbers[numbers.length - 1]));
}

if (text.includes("first crack")) markFirstCrack();
if (text.includes("end roast")) endRoast();
};

recognition.start();
document.getElementById("status").innerText = "Voice active";

} catch (e) {
document.getElementById("status").innerText = "VOICE ERROR: " + e.message;
}
}

/* ================= TEMP + CHART ================= */
function commitTemp(temp){

if (!sessionActive) return;

document.getElementById("tempDisplay").innerText = "Temp: " + temp;

let t = Math.floor((Date.now() - startTime) / 1000);

chart.data.labels.push(t);
chart.data.datasets[0].data.push(temp);

/* RoR */
let ror = 0;

let temps = chart.data.datasets[0].data;
let times = chart.data.labels;

if (temps.length > 1) {
let dt = times[times.length - 1] - times[times.length - 2];
let dT = temps[temps.length - 1] - temps[temps.length - 2];
if (dt !== 0) ror = dT / dt;
}

chart.data.datasets[1].data.push(ror);

chart.update();
}

/* ================= OTHER ================= */
function markFirstCrack(){
document.getElementById("status").innerText = "First Crack";
}

function endRoast(){
sessionActive = false;
document.getElementById("status").innerText = "Complete";
}

</script>

</body>
</html>
